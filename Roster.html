<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Roster PPA Mart 2026</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@media (max-width: 768px) {
  body { font-size: 11px; }
  td, th { padding: 3px 4px; }
}

th, td { white-space: nowrap; }

/* HEADER & LEFT STICKY */
.sticky-top {
  position: sticky;
  top: 0;
  z-index: 40;
  background: #e5e7eb;
}

.col-nik {
  position: sticky;
  left: 0;
  z-index: 60;
  background: #f9fafb;
  text-align: center;
  min-width: 105px;
}

.col-nama {
  position: sticky;
  left: 105px;
  z-index: 60;
  background: #fbf9f9;
  font-weight: 600;
  min-width: 190px;
  text-align: left;
  padding-left: 8px;
}

/* SHIFT COLORS */
.shift-P{background:#016bfe;color:#fff;border:1px solid #222}
.shift-S{background:#02f902;color:#000;border:1px solid #222}
.shift-M{background:#fed669;color:#000;border:1px solid #222}
.shift-C{background:#747475;color:#fff;border:1px solid #222}
.shift-OFF{background:#fa0202;color:#fff;border:1px solid #222}
.shift-STN{background:#fafaf9;color:#000;border:1px solid #222}
.shift-IND{background:#fed669;color:#000;border:1px solid #222}
.shift-PMO{background:#0f766e;color:#fff;border:1px solid #222}
.shift-POP{background:#fbe602;color:#000;border:1px solid #222}
.shift-PMP{background:#fb923c;color:#000;border:1px solid #222}
.shift-SMP{background:#7c3aed;color:#fff;border:1px solid #222}
.shift-MOP{background:#fff;color:#000;border:1px solid #222}

/* TODAY */
.today-header,.today-col{
  border-left:3px solid #dc2626!important;
  border-right:3px solid #dc2626!important;
}

/* WIDTH */
td:not(.col-nik):not(.col-nama),
th:not(.col-nik):not(.col-nama){
  width:44px;min-width:44px;max-width:44px;
}

/* MONTH SEPARATOR */
.month-separator{
  width:8px;min-width:8px;
  background:repeating-linear-gradient(
    45deg,#d1d5db,#d1d5db 2px,#f9fafb 2px,#f9fafb 6px);
  border-left:2px solid #9ca3af;
  border-right:2px solid #9ca3af;
}

/* ACTION BAR */
.action-bar{
  position: sticky;
  bottom: 0;
  z-index: 70;
  background: #fff;
  border-top: 2px solid #e5e7eb;
}
</style>
</head>

<body class="p-4 text-xs" style="background:#f4f6f8">

<!-- HEADER -->
<div class="flex items-center gap-3 mb-3">
  <img src="Logo PPA Mart.png" class="h-14">
  <div>
    <h1 class="text-xl font-bold">Roster PPA Mart 2026</h1>
    <div class="text-xs text-gray-500">Koperasi Karyawan PPA Sejahtera</div>
  </div>
</div>

<!-- LEGEND -->
<div class="flex flex-wrap gap-2 mb-3 text-xs">
  <span class="shift-P px-2 py-1 rounded">P</span>
  <span class="shift-S px-2 py-1 rounded">S</span>
  <span class="shift-M px-2 py-1 rounded">M</span>
  <span class="shift-C px-2 py-1 rounded">C</span>
  <span class="shift-OFF px-2 py-1 rounded">OFF</span>
  <span class="shift-STN px-2 py-1 rounded">STN</span>
  <span class="shift-IND px-2 py-1 rounded">IND</span>
</div>

<!-- AREA ROSTER + PDF -->
<div id="pdfArea" class="overflow-auto bg-white rounded shadow max-h-[80vh]">
  <div class="flex gap-4 mb-2 text-xs text-gray-600 px-1">
    <div>Periode: <b data-periode>memuat...</b></div>
    <div id="lastUpdated">Last updated: memuat...</div>
  </div>

  <table id="rosterTable" class="border-collapse"></table>

  <!-- ACTION BAR -->
  <div class="action-bar p-2 text-xs">
    <div class="flex flex-wrap items-center gap-3">
      <button id="downloadKasir"
        class="px-3 py-1 rounded bg-blue-700 text-white">
        ⬇ CSV Kasir
      </button>

      <button id="downloadPDF"
        class="px-3 py-1 rounded bg-red-600 text-white hover:bg-red-700">
        ⬇ PDF
      </button>

      <div class="flex flex-wrap gap-3 text-gray-700">
        <span><b>P</b> 05–16</span>
        <span><b>P MP/OP</b> 06–17</span>
        <span><b>P MO</b> 07–18</span>
        <span><b>M</b> 08–19</span>
        <span><b>M OP</b> 17–04</span>
        <span><b>S</b> 11–22</span>
        <span><b>S MP</b> 10.30–21.30</span>
        <span><b>STN</b> 09–20</span>
        <span><b>IND</b> 08–19</span>
      </div>
    </div>
  </div>
</div>

<!-- LIBRARY PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- SCRIPT ROSTER -->
<script>
function detectDelimiter(text){
  const first = text.split(/\r?\n/)[0] || '';
  const tabs = (first.match(/\t/g)||[]).length;
  const semis = (first.match(/;/g)||[]).length;
  const commas = (first.match(/,/g)||[]).length;
  if(tabs >= semis && tabs >= commas) return '\t';
  if(semis >= commas) return ';';
  return ',';
}

function parseCSV(text){
  const delimiter = detectDelimiter(text);
  return text.trim().split(/\r?\n/).map(r => r.split(delimiter).map(c => c.trim()));
}

function parseRosterDate(value){
  if(!value) return null;
  const bulan = {
    jan:0, januari:0,
    feb:1, februari:1,
    mar:2, maret:2,
    apr:3, april:3,
    mei:4, may:4,
    jun:5, juni:5,
    jul:6, juli:6,
    agu:7, ags:7, aug:7, agustus:7,
    sep:8, september:8,
    okt:9, oct:9, oktober:9,
    nov:10, november:10,
    des:11, dec:11, desember:11
  };

  const s = String(value).trim();
  let m = s.match(/^(\d{1,2})[-\/\s]([A-Za-zÀ-ÿ]+)[-\/\s](\d{2,4})$/);
  if(m){
    const day = Number(m[1]);
    const mon = bulan[m[2].toLowerCase()];
    let year = Number(m[3]);
    if(year < 100) year += 2000;
    if(mon !== undefined) return new Date(year, mon, day);
  }

  m = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/);
  if(m){
    let year = Number(m[3]);
    if(year < 100) year += 2000;
    return new Date(year, Number(m[2])-1, Number(m[1]));
  }

  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function normalizeShift(value){
  return String(value || '').trim().replace(/\s/g,'');
}

function looksLikeNik(value){
  return /^[A-Z]{1,4}[-\/ ]?\d{3,}$/i.test(String(value || '').trim());
}

fetch('Roster.csv',{cache:'no-store'})
.then(res=>{
  const lm=res.headers.get('Last-Modified');
  document.getElementById('lastUpdated').innerText =
    'Last updated: '+(lm?new Date(lm).toLocaleString('id-ID'):'baru saja');
  return res.text();
})
.then(text=>{
  const rows = parseCSV(text);
  const today = new Date();
  today.setHours(0,0,0,0);
  const end = new Date(today);
  end.setDate(today.getDate()+30);

  const header = rows[0] || [];

  // Cari kolom tanggal pertama. Ini bikin NIK/NAMA tidak geser walau CSV berubah format.
  const firstDateIndex = header.findIndex(h => parseRosterDate(h));
  const identityHeaders = header.slice(0, firstDateIndex).map(h => String(h || '').trim().toUpperCase());

  let nikIndex = identityHeaders.findIndex(h => h === 'NIK' || h.includes('NIK'));
  let namaIndex = identityHeaders.findIndex(h => h === 'NAMA' || h.includes('NAMA'));

  // Fallback: kalau header kacau tapi data kolom pertama mirip NIK, pakai kolom 0 sebagai NIK dan kolom 1 sebagai nama.
  if(nikIndex < 0 && rows[2] && looksLikeNik(rows[2][0])) nikIndex = 0;
  if(namaIndex < 0){
    if(nikIndex === 0 && firstDateIndex > 1) namaIndex = 1;
    else namaIndex = 0;
  }

  const dateIdx = [];
  const dates = [];
  header.forEach((h,i)=>{
    const d = parseRosterDate(h);
    if(d && d >= today && d <= end){
      dateIdx.push(i);
      dates.push(d);
    }
  });

  if(dates.length){
    const b=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    const s=dates[0], e=dates[dates.length-1];
    document.querySelector('[data-periode]').innerText =
      s.getMonth()===e.getMonth() && s.getFullYear()===e.getFullYear()
      ? `${b[s.getMonth()]} ${s.getFullYear()}`
      : `${b[s.getMonth()]} ${s.getFullYear()}–${b[e.getMonth()]} ${e.getFullYear()}`;
  } else {
    document.querySelector('[data-periode]').innerText = 'tanggal tidak terbaca';
  }

  let html = '<thead>';
  html += '<tr class="sticky-top">';
  html += '<th class="col-nik border" rowspan="2">NIK</th>';
  html += '<th class="col-nama border" rowspan="2">NAMA</th>';

  let lastM = null;
  dateIdx.forEach(i=>{
    const d = parseRosterDate(header[i]);
    if(lastM !== null && d.getMonth() !== lastM) html += '<th class="month-separator" rowspan="2"></th>';
    html += `<th class="border text-center ${d.getTime()===today.getTime()?'today-header':''}">${d.getDate()}</th>`;
    lastM = d.getMonth();
  });
  html += '</tr>';

  html += '<tr class="sticky-top">';
  lastM = null;
  dateIdx.forEach(i=>{
    const d = parseRosterDate(header[i]);
    if(lastM !== null && d.getMonth() !== lastM) html += '';
    const hari = (rows[1] && rows[1][i]) ? rows[1][i] : '';
    html += `<th class="border text-center text-[10px] text-gray-600 ${d.getTime()===today.getTime()?'today-header':''}">${hari}</th>`;
    lastM = d.getMonth();
  });
  html += '</tr></thead><tbody>';

  rows.slice(2).forEach(r=>{
    const sec = (r[0] || '').trim().toUpperCase();
    if(['KASIR','OPERASIONAL','BACK OFFICE'].includes(sec)){
      html += `<tr class="bg-slate-800 text-white">
        <td colspan="999" class="px-3 py-2 font-bold text-left">${sec}</td></tr>`;
      return;
    }

    if(!r.some(c => String(c || '').trim())) return;

    const nik = nikIndex >= 0 ? (r[nikIndex] || '') : '';
    const nama = namaIndex >= 0 ? (r[namaIndex] || '') : '';
    if(!nik && !nama) return;

    html += '<tr>';
    html += `<td class="border col-nik">${nik}</td>`;
    html += `<td class="border col-nama">${nama}</td>`;

    lastM = null;
    dateIdx.forEach(i=>{
      const d = parseRosterDate(header[i]);
      if(lastM !== null && d.getMonth() !== lastM) html += '<td class="month-separator"></td>';
      const shift = normalizeShift(r[i]);
      html += `<td class="border text-center shift-${shift} ${d.getTime()===today.getTime()?'today-col':''}">${r[i] || ''}</td>`;
      lastM = d.getMonth();
    });
    html += '</tr>';
  });

  document.getElementById('rosterTable').innerHTML = html + '</tbody>';
})
.catch(err=>{
  document.querySelector('[data-periode]').innerText = 'gagal memuat';
  document.getElementById('rosterTable').innerHTML = `<tbody><tr><td class="p-4 text-red-600">Gagal membaca Roster.csv: ${err.message}</td></tr></tbody>`;
});
</script>

<!-- SCRIPT PDF -->
<script>
document.getElementById('downloadPDF').onclick = () => {
  const el = document.getElementById('pdfArea');
  html2pdf().set({
    margin: 5,
    filename: 'Roster_PPA_Mart_2026.pdf',
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, scrollY: 0 },
    jsPDF: { unit: 'mm', format: 'a3', orientation: 'landscape' }
  }).from(el).save();
};
</script>

</body>
</html>
