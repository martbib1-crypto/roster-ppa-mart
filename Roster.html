<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roster PPA Mart 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @media (max-width: 768px) {
      body { font-size: 11px; }
      td, th { padding: 3px 4px; }
    }

    body {
      background: #f4f6f8;
    }

    th, td {
      white-space: nowrap;
    }

    table {
      border-collapse: collapse;
    }

    /* HEADER & LEFT STICKY */
    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 40;
      background: #e5e7eb;
    }

    .info-sticky {
      position: sticky;
      top: 0;
      z-index: 45;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
    }

    .col-nik {
      position: sticky;
      left: 0;
      z-index: 60;
      background: #f9fafb;
      text-align: center;
      min-width: 90px;
      max-width: 90px;
    }

    .col-nama {
      position: sticky;
      left: 90px;
      z-index: 60;
      background: #fbf9f9;
      font-weight: 600;
      min-width: 180px;
      max-width: 180px;
    }

    .sticky-top .col-nik,
    .sticky-top .col-nama {
      background: #e5e7eb;
      z-index: 70;
    }

    /* SHIFT COLORS */
    .shift-P   { background:#016bfe; color:#fff; border:1px solid #222; }
    .shift-S   { background:#02f902; color:#000; border:1px solid #222; }
    .shift-M   { background:#fed669; color:#000; border:1px solid #222; }
    .shift-C   { background:#747475; color:#fff; border:1px solid #222; }
    .shift-OFF { background:#fa0202; color:#fff; border:1px solid #222; }
    .shift-STN { background:#fafaf9; color:#000; border:1px solid #222; }
    .shift-IND { background:#fed669; color:#000; border:1px solid #222; }
    .shift-PMO { background:#0f766e; color:#fff; border:1px solid #222; }
    .shift-POP { background:#fbe602; color:#000; border:1px solid #222; }
    .shift-PMP { background:#fb923c; color:#000; border:1px solid #222; }
    .shift-SMP { background:#7c3aed; color:#fff; border:1px solid #222; }
    .shift-MOP { background:#ffffff; color:#000; border:1px solid #222; }

    /* default cell shift */
    .shift-default {
      background: #ffffff;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    /* TODAY */
    .today-header,
    .today-col {
      border-left: 3px solid #dc2626 !important;
      border-right: 3px solid #dc2626 !important;
    }

    /* WIDTH */
    td.shift-cell,
    th.shift-cell {
      width: 64px;
      min-width: 64px;
      max-width: 64px;
      text-align: center;
    }

    /* MONTH SEPARATOR */
    .month-separator {
      width: 10px;
      min-width: 10px;
      max-width: 10px;
      background: repeating-linear-gradient(
        45deg,
        #d1d5db,
        #d1d5db 2px,
        #f9fafb 2px,
        #f9fafb 6px
      );
      border-left: 2px solid #9ca3af;
      border-right: 2px solid #9ca3af;
      padding: 0 !important;
    }

    /* ACTION BAR */
    .action-bar {
      position: sticky;
      bottom: 0;
      z-index: 70;
      background: #fff;
      border-top: 2px solid #e5e7eb;
    }

    .section-row td {
      background: #1e293b;
      color: white;
      font-weight: 700;
      padding: 8px 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
  </style>
</head>

<body class="p-4 text-xs">
  <!-- HEADER -->
  <div class="flex items-center gap-3 mb-3">
    <img src="Logo PPA Mart.png" class="h-14" alt="Logo PPA Mart">
    <div>
      <h1 class="text-xl font-bold">Roster PPA Mart 2026</h1>
      <div class="text-xs text-gray-500">Koperasi Karyawan PPA Sejahtera</div>
    </div>
  </div>

  <!-- LEGEND -->
  <div class="flex flex-wrap gap-2 mb-3 text-xs">
    <span class="shift-P px-2 py-1 rounded">P</span>
    <span class="shift-S px-2 py-1 rounded">S</span>
    <span class="shift-M px-2 py-1 rounded">M</span>
    <span class="shift-C px-2 py-1 rounded">C</span>
    <span class="shift-OFF px-2 py-1 rounded">OFF</span>
    <span class="shift-STN px-2 py-1 rounded">STN</span>
    <span class="shift-IND px-2 py-1 rounded">IND</span>
    <span class="shift-PMO px-2 py-1 rounded">P MO</span>
    <span class="shift-POP px-2 py-1 rounded">P OP</span>
    <span class="shift-PMP px-2 py-1 rounded">P MP</span>
    <span class="shift-SMP px-2 py-1 rounded">S MP</span>
    <span class="shift-MOP px-2 py-1 rounded">M OP</span>
  </div>

  <!-- AREA ROSTER -->
  <div id="pdfArea" class="bg-white rounded shadow overflow-hidden">
    <div class="overflow-auto max-h-[80vh]">
      <div class="info-sticky px-3 py-2">
        <div class="flex flex-wrap gap-4 text-xs text-gray-600">
          <div>Periode: <b data-periode>memuat...</b></div>
          <div id="lastUpdated">Last updated: memuat...</div>
        </div>
      </div>

      <table id="rosterTable" class="border-collapse"></table>
    </div>

    <!-- ACTION BAR -->
    <div class="action-bar p-2 text-xs">
      <div class="flex flex-wrap items-center gap-3">
        <button
          id="downloadKasir"
          class="px-3 py-1 rounded bg-blue-700 text-white hover:bg-blue-800"
          type="button"
        >
          ⬇ CSV Kasir
        </button>

        <button
          id="downloadPDF"
          class="px-3 py-1 rounded bg-red-600 text-white hover:bg-red-700"
          type="button"
        >
          ⬇ PDF
        </button>

        <div class="flex flex-wrap gap-3 text-gray-700">
          <span><b>P</b> 05–16</span>
          <span><b>P MP/OP</b> 06–17</span>
          <span><b>P MO</b> 07–18</span>
          <span><b>M</b> 08–19</span>
          <span><b>M OP</b> 17–04</span>
          <span><b>S</b> 11–22</span>
          <span><b>S MP</b> 10.30–21.30</span>
          <span><b>STN</b> 09–20</span>
          <span><b>IND</b> 08–19</span>
        </div>
      </div>
    </div>
  </div>

  <!-- LIBRARY PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
fetch('Roster.csv',{cache:'no-store'})
.then(res=>{
  const lm=res.headers.get('Last-Modified');
  document.getElementById('lastUpdated').innerText =
    'Last updated: '+(lm?new Date(lm).toLocaleString('id-ID'):'baru saja');
  return res.text();
})
.then(text=>{
  const rows=text.trim().split('\n').map(r=>r.split(';').map(c=>c.trim()));

  // ===== FIX TANGGAL =====
  const today = new Date();
  today.setHours(0,0,0,0);

  // 31 hari (hari ini + 30 hari ke depan)
  const end = new Date(today.getTime() + (30 * 24 * 60 * 60 * 1000));

  const idx=[],dates=[];

  rows[0].forEach((h,i)=>{
    if(i<2){idx.push(i);return;}

    // ===== PARSE TANGGAL LEBIH AMAN =====
    let d = new Date(h);

    // fallback kalau format DD/MM/YYYY
    if(isNaN(d) && h.includes('/')){
      const [dd,mm,yy] = h.split('/');
      d = new Date(`${yy}-${mm}-${dd}`);
    }

    // paksa tanpa timezone geser
    if(!isNaN(d)){
      d = new Date(d.toISOString().split('T')[0]);
    }

    if(!isNaN(d) && d>=today && d<=end){
      idx.push(i);
      dates.push(d);
    }
  });

  // ===== PERIODE =====
  if(dates.length){
    const b=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    const s=dates[0],e=dates.at(-1);

    document.querySelector('[data-periode]').innerText =
      s.getMonth()===e.getMonth()
      ? `${b[s.getMonth()]} ${s.getFullYear()}`
      : `${b[s.getMonth()]}–${b[e.getMonth()]} ${e.getFullYear()}`;
  }

  // ===== HEADER =====
  let html='<thead><tr class="sticky-top">',lastM=null;

  idx.forEach(i=>{
    if(i===0){html+='<th class="col-nik border">NIK</th>';return;}
    if(i===1){html+='<th class="col-nama border">NAMA</th>';return;}

    let d = new Date(rows[0][i]);
    if(isNaN(d) && rows[0][i].includes('/')){
      const [dd,mm,yy] = rows[0][i].split('/');
      d = new Date(`${yy}-${mm}-${dd}`);
    }

    if(lastM!==null && d.getMonth()!==lastM){
      html+='<th class="month-separator"></th>';
    }

    html+=`<th class="border text-center ${d.getTime()===today.getTime()?'today-header':''}">
      ${d.getDate()}
    </th>`;

    lastM=d.getMonth();
  });

  html+='</tr></thead><tbody>';

  // ===== BODY =====
  rows.slice(1).forEach(r=>{
    const sec=r[0]?.toUpperCase();

    if(['KASIR','OPERASIONAL','BACK OFFICE'].includes(sec)){
      html+=`<tr class="bg-slate-800 text-white">
        <td colspan="${idx.length*2}" class="px-3 py-2 font-bold">${sec}</td></tr>`;
      return;
    }

    html+='<tr>';
    lastM=null;

    idx.forEach(i=>{
      if(i<2){
        html+=`<td class="border ${i===0?'col-nik':'col-nama'}">${r[i]||''}</td>`;
        return;
      }

      let d = new Date(rows[0][i]);
      if(isNaN(d) && rows[0][i].includes('/')){
        const [dd,mm,yy] = rows[0][i].split('/');
        d = new Date(`${yy}-${mm}-${dd}`);
      }

      if(lastM!==null && d.getMonth()!==lastM){
        html+='<td class="month-separator"></td>';
      }

      html+=`<td class="border text-center shift-${(r[i]||'').replace(/\s/g,'')}
        ${d.getTime()===today.getTime()?'today-col':''}">
        ${r[i]||''}
      </td>`;

      lastM=d.getMonth();
    });

    html+='</tr>';
  });

  document.getElementById('rosterTable').innerHTML = html+'</tbody>';
});
</script>
</body>
</html>
