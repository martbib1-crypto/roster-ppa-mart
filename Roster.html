<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roster PPA Mart 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @media (max-width: 768px) {
      body { font-size: 11px; }
      td, th { padding: 3px 4px; }
    }

    body {
      background: #f4f6f8;
    }

    th, td {
      white-space: nowrap;
    }

    table {
      border-collapse: collapse;
    }

    /* HEADER & LEFT STICKY */
    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 40;
      background: #e5e7eb;
    }

    .info-sticky {
      position: sticky;
      top: 0;
      z-index: 45;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
    }

    .col-nik {
      position: sticky;
      left: 0;
      z-index: 60;
      background: #f9fafb;
      text-align: center;
      min-width: 90px;
      max-width: 90px;
    }

    .col-nama {
      position: sticky;
      left: 90px;
      z-index: 60;
      background: #fbf9f9;
      font-weight: 600;
      min-width: 180px;
      max-width: 180px;
    }

    .sticky-top .col-nik,
    .sticky-top .col-nama {
      background: #e5e7eb;
      z-index: 70;
    }

    /* SHIFT COLORS */
    .shift-P   { background:#016bfe; color:#fff; border:1px solid #222; }
    .shift-S   { background:#02f902; color:#000; border:1px solid #222; }
    .shift-M   { background:#fed669; color:#000; border:1px solid #222; }
    .shift-C   { background:#747475; color:#fff; border:1px solid #222; }
    .shift-OFF { background:#fa0202; color:#fff; border:1px solid #222; }
    .shift-STN { background:#fafaf9; color:#000; border:1px solid #222; }
    .shift-IND { background:#fed669; color:#000; border:1px solid #222; }
    .shift-PMO { background:#0f766e; color:#fff; border:1px solid #222; }
    .shift-POP { background:#fbe602; color:#000; border:1px solid #222; }
    .shift-PMP { background:#fb923c; color:#000; border:1px solid #222; }
    .shift-SMP { background:#7c3aed; color:#fff; border:1px solid #222; }
    .shift-MOP { background:#ffffff; color:#000; border:1px solid #222; }

    /* default cell shift */
    .shift-default {
      background: #ffffff;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    /* TODAY */
    .today-header,
    .today-col {
      border-left: 3px solid #dc2626 !important;
      border-right: 3px solid #dc2626 !important;
    }

    /* WIDTH */
    td.shift-cell,
    th.shift-cell {
      width: 64px;
      min-width: 64px;
      max-width: 64px;
      text-align: center;
    }

    /* MONTH SEPARATOR */
    .month-separator {
      width: 10px;
      min-width: 10px;
      max-width: 10px;
      background: repeating-linear-gradient(
        45deg,
        #d1d5db,
        #d1d5db 2px,
        #f9fafb 2px,
        #f9fafb 6px
      );
      border-left: 2px solid #9ca3af;
      border-right: 2px solid #9ca3af;
      padding: 0 !important;
    }

    /* ACTION BAR */
    .action-bar {
      position: sticky;
      bottom: 0;
      z-index: 70;
      background: #fff;
      border-top: 2px solid #e5e7eb;
    }

    .section-row td {
      background: #1e293b;
      color: white;
      font-weight: 700;
      padding: 8px 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
  </style>
</head>

<body class="p-4 text-xs">
  <!-- HEADER -->
  <div class="flex items-center gap-3 mb-3">
    <img src="Logo PPA Mart.png" class="h-14" alt="Logo PPA Mart">
    <div>
      <h1 class="text-xl font-bold">Roster PPA Mart 2026</h1>
      <div class="text-xs text-gray-500">Koperasi Karyawan PPA Sejahtera</div>
    </div>
  </div>

  <!-- LEGEND -->
  <div class="flex flex-wrap gap-2 mb-3 text-xs">
    <span class="shift-P px-2 py-1 rounded">P</span>
    <span class="shift-S px-2 py-1 rounded">S</span>
    <span class="shift-M px-2 py-1 rounded">M</span>
    <span class="shift-C px-2 py-1 rounded">C</span>
    <span class="shift-OFF px-2 py-1 rounded">OFF</span>
    <span class="shift-STN px-2 py-1 rounded">STN</span>
    <span class="shift-IND px-2 py-1 rounded">IND</span>
    <span class="shift-PMO px-2 py-1 rounded">P MO</span>
    <span class="shift-POP px-2 py-1 rounded">P OP</span>
    <span class="shift-PMP px-2 py-1 rounded">P MP</span>
    <span class="shift-SMP px-2 py-1 rounded">S MP</span>
    <span class="shift-MOP px-2 py-1 rounded">M OP</span>
  </div>

  <!-- AREA ROSTER -->
  <div id="pdfArea" class="bg-white rounded shadow overflow-hidden">
    <div class="overflow-auto max-h-[80vh]">
      <div class="info-sticky px-3 py-2">
        <div class="flex flex-wrap gap-4 text-xs text-gray-600">
          <div>Periode: <b data-periode>memuat...</b></div>
          <div id="lastUpdated">Last updated: memuat...</div>
        </div>
      </div>

      <table id="rosterTable" class="border-collapse"></table>
    </div>

    <!-- ACTION BAR -->
    <div class="action-bar p-2 text-xs">
      <div class="flex flex-wrap items-center gap-3">
        <button
          id="downloadKasir"
          class="px-3 py-1 rounded bg-blue-700 text-white hover:bg-blue-800"
          type="button"
        >
          ⬇ CSV Kasir
        </button>

        <button
          id="downloadPDF"
          class="px-3 py-1 rounded bg-red-600 text-white hover:bg-red-700"
          type="button"
        >
          ⬇ PDF
        </button>

        <div class="flex flex-wrap gap-3 text-gray-700">
          <span><b>P</b> 05–16</span>
          <span><b>P MP/OP</b> 06–17</span>
          <span><b>P MO</b> 07–18</span>
          <span><b>M</b> 08–19</span>
          <span><b>M OP</b> 17–04</span>
          <span><b>S</b> 11–22</span>
          <span><b>S MP</b> 10.30–21.30</span>
          <span><b>STN</b> 09–20</span>
          <span><b>IND</b> 08–19</span>
        </div>
      </div>
    </div>
  </div>

  <!-- LIBRARY PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    const MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];

    function parseDateSafe(value) {
      if (!value) return null;
      const v = String(value).trim();

      if (/^\d{4}-\d{2}-\d{2}$/.test(v)) {
        const [y, m, d] = v.split('-').map(Number);
        return new Date(y, m - 1, d);
      }

      if (/^\d{2}\/\d{2}\/\d{4}$/.test(v)) {
        const [d, m, y] = v.split('/').map(Number);
        return new Date(y, m - 1, d);
      }

      if (/^\d{2}-\d{2}-\d{4}$/.test(v)) {
        const [d, m, y] = v.split('-').map(Number);
        return new Date(y, m - 1, d);
      }

      const d = new Date(v);
      return isNaN(d) ? null : new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getShiftClass(value) {
      const key = String(value || '').trim().toUpperCase().replace(/\s+/g, '');

      const map = {
        'P': 'shift-P',
        'S': 'shift-S',
        'M': 'shift-M',
        'C': 'shift-C',
        'OFF': 'shift-OFF',
        'STN': 'shift-STN',
        'IND': 'shift-IND',
        'PMO': 'shift-PMO',
        'POP': 'shift-POP',
        'PMP': 'shift-PMP',
        'SMP': 'shift-SMP',
        'MOP': 'shift-MOP'
      };

      return map[key] || 'shift-default';
    }

    function buildRoster(csvText) {
      const table = document.getElementById('rosterTable');
      const rows = csvText
        .trim()
        .split(/\r?\n/)
        .map(r => r.split(';').map(c => c.trim()));

      if (!rows.length || rows[0].length < 3) {
        table.innerHTML = '<tr><td class="p-4 text-red-600">Format CSV tidak valid.</td></tr>';
        return;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const end = new Date(today);
      end.setDate(today.getDate() + 30);

      const rawHeader = rows[0];
      const selectedCols = [
        { type: 'nik', index: 0 },
        { type: 'nama', index: 1 }
      ];

      const visibleDates = [];
      let lastMonth = null;

      for (let i = 2; i < rawHeader.length; i++) {
        const d = parseDateSafe(rawHeader[i]);
        if (!d) continue;
        if (d >= today && d <= end) {
          if (lastMonth !== null && d.getMonth() !== lastMonth) {
            selectedCols.push({ type: 'separator' });
          }
          selectedCols.push({ type: 'date', index: i, date: d });
          visibleDates.push(d);
          lastMonth = d.getMonth();
        }
      }

      if (!visibleDates.length) {
        table.innerHTML = '<tr><td class="p-4 text-red-600">Tidak ada tanggal yang cocok untuk 30 hari ke depan.</td></tr>';
        return;
      }

      const startDate = visibleDates[0];
      const endDate = visibleDates[visibleDates.length - 1];

      document.querySelector('[data-periode]').innerText =
        startDate.getMonth() === endDate.getMonth() && startDate.getFullYear() === endDate.getFullYear()
          ? `${MONTH_NAMES[startDate.getMonth()]} ${startDate.getFullYear()}`
          : startDate.getFullYear() === endDate.getFullYear()
            ? `${MONTH_NAMES[startDate.getMonth()]}–${MONTH_NAMES[endDate.getMonth()]} ${endDate.getFullYear()}`
            : `${MONTH_NAMES[startDate.getMonth()]} ${startDate.getFullYear()} – ${MONTH_NAMES[endDate.getMonth()]} ${endDate.getFullYear()}`;

      let html = '<thead>';
      html += '<tr class="sticky-top">';

      selectedCols.forEach(col => {
        if (col.type === 'nik') {
          html += '<th class="col-nik border px-2 py-2">NIK</th>';
        } else if (col.type === 'nama') {
          html += '<th class="col-nama border px-2 py-2">NAMA</th>';
        } else if (col.type === 'separator') {
          html += '<th class="month-separator"></th>';
        } else if (col.type === 'date') {
          const isToday = col.date.getTime() === today.getTime();
          html += `<th class="border px-2 py-2 shift-cell ${isToday ? 'today-header' : ''}">${col.date.getDate()}</th>`;
        }
      });

      html += '</tr></thead><tbody>';

      rows.slice(1).forEach(r => {
        const firstCell = (r[0] || '').trim().toUpperCase();

        if (['KASIR', 'OPERASIONAL', 'BACK OFFICE'].includes(firstCell)) {
          html += `
            <tr class="section-row">
              <td colspan="${selectedCols.length}">${escapeHtml(firstCell)}</td>
            </tr>
          `;
          return;
        }

        html += '<tr>';

        selectedCols.forEach(col => {
          if (col.type === 'nik') {
            html += `<td class="border col-nik px-2 py-1">${escapeHtml(r[0] || '')}</td>`;
          } else if (col.type === 'nama') {
            html += `<td class="border col-nama px-2 py-1">${escapeHtml(r[1] || '')}</td>`;
          } else if (col.type === 'separator') {
            html += '<td class="month-separator"></td>';
          } else if (col.type === 'date') {
            const value = (r[col.index] || '').trim();
            const cls = getShiftClass(value);
            const isToday = col.date.getTime() === today.getTime();

            html += `
              <td class="border px-2 py-1 shift-cell ${cls} ${isToday ? 'today-col' : ''}">
                ${escapeHtml(value)}
              </td>
            `;
          }
        });

        html += '</tr>';
      });

      html += '</tbody>';
      table.innerHTML = html;
    }

    fetch('Roster.csv', { cache: 'no-store' })
      .then(res => {
        if (!res.ok) {
          throw new Error('Gagal mengambil file Roster.csv');
        }

        const lm = res.headers.get('Last-Modified');
        document.getElementById('lastUpdated').innerText =
          'Last updated: ' + (lm ? new Date(lm).toLocaleString('id-ID') : 'baru saja');

        return res.text();
      })
      .then(buildRoster)
      .catch(err => {
        document.getElementById('lastUpdated').innerText = 'Last updated: gagal dimuat';
        document.getElementById('rosterTable').innerHTML = `
          <tr>
            <td class="p-4 text-red-600 border">
              Gagal memuat roster: ${escapeHtml(err.message)}
            </td>
          </tr>
        `;
      });

    document.getElementById('downloadPDF').onclick = () => {
      const source = document.getElementById('pdfArea');
      const clone = source.cloneNode(true);

      clone.style.maxHeight = 'none';
      clone.style.overflow = 'visible';
      clone.style.background = '#ffffff';
      clone.style.width = 'max-content';

      const scrollBox = clone.querySelector('.overflow-auto');
      if (scrollBox) {
        scrollBox.style.maxHeight = 'none';
        scrollBox.style.overflow = 'visible';
      }

      const actionBar = clone.querySelector('.action-bar');
      if (actionBar) {
        actionBar.style.position = 'static';
      }

      const infoSticky = clone.querySelector('.info-sticky');
      if (infoSticky) {
        infoSticky.style.position = 'static';
      }

      clone.style.padding = '10px';

      const wrapper = document.createElement('div');
      wrapper.style.background = '#ffffff';
      wrapper.style.padding = '10px';
      wrapper.appendChild(clone);

      html2pdf().set({
        margin: 5,
        filename: 'Roster_PPA_Mart_2026.pdf',
        image: { type: 'jpeg', quality: 0.95 },
        html2canvas: {
          scale: 2,
          scrollY: 0,
          useCORS: true
        },
        jsPDF: {
          unit: 'mm',
          format: 'a3',
          orientation: 'landscape'
        },
        pagebreak: { mode: ['css', 'legacy'] }
      }).from(wrapper).save();
    };

    document.getElementById('downloadKasir').onclick = () => {
      fetch('Roster.csv', { cache: 'no-store' })
        .then(res => {
          if (!res.ok) throw new Error('Gagal mengambil CSV');
          return res.blob();
        })
        .then(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'Roster.csv';
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        })
        .catch(err => {
          alert('Gagal download CSV: ' + err.message);
        });
    };
  </script>
</body>
</html>
